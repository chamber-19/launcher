# Pre-installs the toolchain Copilot's coding agent needs to work on this repo.
# Job MUST be named `copilot-setup-steps` (singular). Runs before the agent boots.
#
# Critical: this authenticates npm to GitHub Packages so the agent can run a
# real `npm install` when bumping @chamber-19/desktop-toolkit (regenerating
# package-lock.json with correct integrity hashes). Hand-editing the lockfile
# has bitten sibling repos multiple times — this prevents that failure mode.
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # required for GitHub Packages npm registry

    steps:
      - uses: actions/checkout@v4

      # ── Node + GitHub Packages auth ────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@chamber-19"

      - name: Install frontend deps (with GH Packages auth)
        working-directory: frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      # ── Rust + Tauri ──────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          toolchain: "1.77.2"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── .NET SDK (so the AutoCAD plugin can at least restore) ─────────────
      # The AutoCAD managed references (Autodesk.AutoCAD.Interop, etc.) are
      # not available without AutoCAD installed, so `dotnet build` will not
      # succeed in CI. `dotnet restore` is sufficient to verify the csproj
      # parses and any pure-NuGet deps can be resolved.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Restore AutoCAD plugin NuGet packages
        working-directory: tools/ch19-line-totaler
        run: dotnet restore
        continue-on-error: true   # fails without AutoCAD SDK — expected in CI

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          cargo --version
          rustc --version
          dotnet --version
