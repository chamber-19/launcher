# Dependabot configuration
#
# Launcher is a Windows-only Tauri/NSIS app. Tauri's Linux GTK transitive graph
# can surface RustSec alerts for crates that are not compiled into the shipped
# Windows installer. Keep the ignores documented here until a Tauri major bump
# removes the transitive dependency path.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/frontend/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    ignore:
      - dependency-name: "glib"
        versions: ["0.x"]
      - dependency-name: "rand"
        versions: ["0.7.x"]
      - dependency-name: "desktop-toolkit"
        # Toolkit pins are bumped manually alongside the npm package.

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      - dependency-name: "@chamber-19/desktop-toolkit"
        # Toolkit pins are paired npm + Cargo review PRs.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
