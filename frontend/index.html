<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopvac</title>
    <!-- Background colour matches the splash fade-out target so there's no
         white flash between splash close and the React app's first paint. -->
    <style>
      html, body { background: #0a0806; margin: 0; }
      /* Brief opacity cross-fade on first paint — ensures a smooth
         transition from the closing splash window to the main app. The
         `app-ready` class is added by main.jsx after React mounts. */
      body { opacity: 0; transition: opacity 250ms ease; }
      body.app-ready { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
